name: Renew calendar data

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Renew JSON data
        run: node scripts/renew-data.mjs

      - name: Commit renewed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/events.json data/closures.json data/renewal-status.json; then
            echo "No data changes to commit."
          else
            git add data/events.json data/closures.json data/renewal-status.json
            git commit -m "Renew calendar data"
            git push
          fi
